<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineGold | Premium Movie Database</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #050505;
            --deep-red: #8b0000;
            --bright-red: #ff0000;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --glass: rgba(20, 20, 20, 0.8);
            --text-white: #ffffff;
            --text-dim: #a0a0a0;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Animated Background --- */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            filter: drop-shadow(0 0 10px var(--deep-red));
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loader-logo {
            font-size: 3rem;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--gold-glow);
        }

        .loader-logo span { color: var(--deep-red); }

        .progress-box {
            width: 250px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--deep-red), var(--gold));
            box-shadow: 0 0 15px var(--deep-red);
            transition: width 0.3s ease;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Landing View --- */
        #landing-view {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .hero-logo {
            font-size: 5rem;
            font-weight: 900;
            color: var(--text-white);
            margin-bottom: 40px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-logo span { color: var(--deep-red); border-bottom: 4px solid var(--gold); }

        .search-container {
            width: 90%;
            max-width: 700px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .main-search {
            width: 100%;
            padding: 20px 30px;
            font-size: 1.2rem;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50px;
            color: white;
            outline: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .main-search:focus {
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold-glow), 0 10px 40px rgba(0,0,0,0.8);
        }

        /* --- Content View --- */
        #content-view {
            display: none;
            padding: 40px 5%;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .mini-logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--gold);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        /* --- Movie Card --- */
        .movie-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            border: 1px solid #222;
        }

        .movie-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: var(--gold);
            box-shadow: 0 15px 35px rgba(139, 0, 0, 0.4);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            transition: var(--transition);
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(to top, #000, transparent);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .rating-tag { color: var(--gold); font-weight: bold; }

        /* --- Pagination --- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .pag-btn {
            background: var(--deep-red);
            color: white;
            border: 1px solid var(--gold);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pag-btn:disabled {
            background: #222;
            border-color: #333;
            cursor: not-allowed;
            color: #555;
        }

        .pag-btn:hover:not(:disabled) {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* --- Modal --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 20px;
            position: relative;
            display: flex;
            overflow: hidden;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .modal-poster { width: 40%; object-fit: cover; }

        .modal-details {
            width: 60%;
            padding: 40px;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .close-modal:hover { color: var(--gold); }

        .fav-btn {
            background: transparent;
            border: 1px solid var(--deep-red);
            color: var(--deep-red);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .fav-btn.active { background: var(--deep-red); color: white; }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--gold);
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-left: 10px;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .hero-logo { font-size: 3rem; }
            .modal-content { flex-direction: column; }
            .modal-poster { width: 100%; height: 300px; }
            .modal-details { width: 100%; padding: 20px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }

        /* --- Error Screen --- */
        #error-screen {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .error-icon { font-size: 4rem; color: var(--deep-red); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-logo">CINE<span>GOLD</span></div>
        <div class="progress-box"><div id="progress-bar"></div></div>
        <p id="status-msg">Initializing...</p>
    </div>

    <!-- Landing View -->
    <div id="landing-view">
        <h1 class="hero-logo">CINE<span>GOLD</span></h1>
        <div class="search-container">
            <input type="text" class="main-search" id="search-input" placeholder="Search 12,000+ movies & TV shows...">
        </div>
    </div>

    <!-- Content View -->
    <div id="content-view">
        <div class="top-nav">
            <div class="mini-logo" onclick="location.reload()">CINE<span>GOLD</span></div>
            <div class="search-container" style="max-width: 400px;">
                <input type="text" class="main-search" id="nav-search" style="padding: 12px 25px; font-size: 0.9rem;">
            </div>
            <div id="user-stats" style="font-size: 0.8rem; color: var(--gold);">
                <i class="fas fa-heart"></i> <span id="fav-count">0</span>
            </div>
        </div>

        <div id="movie-grid" class="movie-grid"></div>

        <div class="pagination">
            <button class="pag-btn" id="prev-btn">Previous</button>
            <span id="page-indicator">Page 1 of 1</span>
            <button class="pag-btn" id="next-btn">Next</button>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <h2>Database Unavailable</h2>
        <p>We are currently polishing the collection. Please try again later.</p>
    </div>

    <!-- Modal -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img src="" alt="" class="modal-poster" id="modal-img">
            <div class="modal-details">
                <h2 id="modal-title" style="font-size: 2rem; color: var(--gold);"></h2>
                <p id="modal-meta" style="margin: 10px 0; color: var(--text-dim);"></p>
                <div style="margin: 20px 0; line-height: 1.6;" id="modal-desc"></div>
                <div id="modal-extra" style="font-size: 0.9rem; color: var(--gold);"></div>
                
                <button id="add-fav" class="fav-btn">
                    <i class="fas fa-heart"></i> Add to Favorites
                </button>
                <a href="#" id="dl-link" class="download-btn">
                    <i class="fas fa-download"></i> Download
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let allMovies = [];
        let filteredMovies = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        let favorites = JSON.parse(localStorage.getItem('cg_favs')) || [];
        let history = JSON.parse(localStorage.getItem('cg_history')) || [];

        const emojis = ['🎃', '☕', '🚏', '🎑', '📸', '🪄', '🎥', '🎬', '🎭'];

        // --- Init ---
        window.onload = () => {
            initBackground();
            fetchData();
            updateFavCount();
        };

        function initBackground() {
            const container = document.getElementById('bg-container');
            for(let i=0; i<15; i++) {
                const el = document.createElement('div');
                el.className = 'floating-emoji';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 20 + 10) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(el);
            }
        }

        async function fetchData() {
            const pb = document.getElementById('progress-bar');
            const msg = document.getElementById('status-msg');
            
            try {
                msg.innerText = "Connecting to library...";
                pb.style.width = "20%";

                const response = await fetch('./movies.json');
                if(!response.ok) throw new Error();

                pb.style.width = "60%";
                msg.innerText = "Cataloging 12,000+ Titles...";

                allMovies = await response.json();
                filteredMovies = [...allMovies];

                pb.style.width = "100%";
                msg.innerText = "Ready";

                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);

            } catch (err) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('landing-view').style.display = 'none';
                document.getElementById('error-screen').style.display = 'block';
            }
        }

        // --- Search Logic ---
        const searchInput = document.getElementById('search-input');
        const navSearch = document.getElementById('nav-search');

        function handleSearch(e) {
            const term = e.target.value.toLowerCase();
            
            // Switch view if first time searching
            document.getElementById('landing-view').style.display = 'none';
            document.getElementById('content-view').style.display = 'block';
            
            // Ensure both inputs are synced
            searchInput.value = e.target.value;
            navSearch.value = e.target.value;

            // Filter
            filteredMovies = allMovies.filter(m => 
                m.title.toLowerCase().includes(term)
            );

            currentPage = 1;
            renderGrid();
        }

        // Debounce search
        let debounceTimer;
        const debounceSearch = (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => handleSearch(e), 300);
        };

        searchInput.addEventListener('input', debounceSearch);
        navSearch.addEventListener('input', debounceSearch);

        // --- Render Logic ---
        function renderGrid() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredMovies.slice(start, end);

            pageItems.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta">
                            <span>${movie.year}</span>
                            <span class="rating-tag"><i class="fas fa-star"></i> ${movie.rating || 'N/A'}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(movie);
                grid.appendChild(card);
            });

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredMovies.length / itemsPerPage) || 1;
            document.getElementById('page-indicator').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        document.getElementById('prev-btn').onclick = () => {
            if(currentPage > 1) {
                currentPage--;
                renderGrid();
                window.scrollTo(0, 0);
            }
        };

        document.getElementById('next-btn').onclick = () => {
            const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
            if(currentPage < totalPages) {
                currentPage++;
                renderGrid();
                window.scrollTo(0, 0);
            }
        };

        // --- Modal & Features ---
        const modal = document.getElementById('movie-modal');
        let currentMovie = null;

        function openModal(movie) {
            currentMovie = movie;
            document.getElementById('modal-img').src = movie.poster;
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-meta').innerText = `${movie.year} | ${movie.genre || 'Action'} | ${movie.runtime || '2h 10m'}`;
            document.getElementById('modal-desc').innerText = movie.description || "In a world of cinematic excellence, this title stands as a testament to premium storytelling. Experience the journey of a lifetime with this exclusive CineGold feature.";
            document.getElementById('modal-extra').innerText = `Rating: ${movie.rating} / 10`;
            
            const favBtn = document.getElementById('add-fav');
            if(favorites.includes(movie.title)) {
                favBtn.classList.add('active');
                favBtn.innerHTML = '<i class="fas fa-check"></i> In Favorites';
            } else {
                favBtn.classList.remove('active');
                favBtn.innerHTML = '<i class="fas fa-heart"></i> Add to Favorites';
            }

            document.getElementById('dl-link').href = movie.downloadUrl || "#";

            modal.style.display = 'flex';
            
            // History
            if(!history.includes(movie.title)) {
                history.push(movie.title);
                localStorage.setItem('cg_history', JSON.stringify(history.slice(-100)));
            }
        }

        document.querySelector('.close-modal').onclick = () => {
            modal.style.display = 'none';
        };

        document.getElementById('add-fav').onclick = () => {
            const idx = favorites.indexOf(currentMovie.title);
            if(idx > -1) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(currentMovie.title);
            }
            localStorage.setItem('cg_favs', JSON.stringify(favorites));
            openModal(currentMovie); // Refresh modal UI
            updateFavCount();
        };

        function updateFavCount() {
            document.getElementById('fav-count').innerText = favorites.length;
        }

        window.onclick = (e) => {
            if (e.target == modal) modal.style.display = "none";
        };
    </script>
</body>
</html>
